l_english:
 
 VILTRUMITE:0 "Viltrumite"
 VILTRUMITE_desc:0 "The warrior race that once dominated galaxies"
 VILTRUMITE_plural:0 "Viltrumites"
 
 species_name_viltrumite_species:0 "Viltrumite"
 species_plural_viltrumite_species:0 "Viltrumites"
 species_adjective_viltrumite_species:0 "Viltrumite"
 trait_viltrumite_pure:0 "Pure Viltrumite"
 trait_viltrumite_pure_desc:0 "Born of the warrior race that dominated galaxies for millennia. Viltrumites possess strength that can crack planets, reflexes that dodge starfire, and lifespans measured in thousands of years. Their very biology is engineered for conquest.\n\n§YRacial Traits:§!\nLeaders live 5000 years\nArmies deal 500% more damage\nArmies have 500% more health\nLeaders gain 50% more experience\nPerfect habitability on all worlds\nResearch speed increased by 30%\nEdict fund increased by 25%\n\n§RBiological Limitation:§!\nPopulation growth reduced by 50%"
 
 origin_viltrum_survivors:0 "Viltrum Survivors"
 origin_viltrum_survivors_desc:0 "The Scourge Virus has devastated Viltrum. What was once a thriving empire of billions is now reduced to barely a hundred pure-blooded survivors. But these survivors are not broken. They are the strongest, the most ruthless, the most skilled warriors the Viltrumite Empire has ever produced. Living for thousands of years, nearly impossible to kill, and capable of shattering worlds with their bare hands, they will reclaim what was lost. The galaxy will bow, or it will burn."
 origin_viltrum_survivors_secondary_desc:0 "Requires Dictatorial authority with Authoritarian, Xenophobe, and Militarist ethics. Your homeworld begins with approximately 100 Viltrumites who survived the plague."
 origin_viltrum_survivors_starting_pops:0 "Survivors' Resolve"
 origin_viltrum_survivors_starting_pops_desc:0 "The devastating Scourge Virus has culled the weak. Only the strongest pure-blooded Viltrumites remain. Population growth is severely reduced as the survivors focus on conquest rather than reproduction."
 
 bombardment_viltrumite_annihilation:0 "Viltrumite Annihilation"
 bombardment_viltrumite_annihilation_desc:0 "Viltrumites fly directly through orbital defense grids and pummel the planet itself. Each warrior strikes with the force of orbital bombardment, cracking continents and incinerating armies. When a world resists too long, they simply shatter it. No fortification can withstand them. No army can stop them. Resistance is annihilation."
 viltrumite_cracked_tomb:0 "Viltrumite Cracked Tomb"
 viltrumite_cracked_tomb_desc:0 "This world resisted Viltrumite conquest. The survivors paid the ultimate price. Massive tectonic rifts scar the surface where Viltrumite warriors struck the planetary crust with superhuman force, fracturing the mantle and leaving nothing but a shattered, lifeless husk."
 
 viltrum_annihilation.2.name:0 "Planet Shattered"
 viltrum_annihilation.2.desc:0 "Our warriors have struck the final blow. The planet's core, already destabilized by days of relentless bombardment, ruptures catastrophically. Massive tectonic rifts tear across continents as the crust fractures like glass. Within seconds, the world convulses violently before exploding into billions of lifeless fragments. The debris field scatters across the system, a permanent monument to Viltrumite power. Nothing survives. Nothing remains."
 viltrum_annihilation.2.a:0 "Another world broken. The galaxy learns fear."

 viltrum_start_pops.1.name:0 "The Scourge Virus: First Contact"
 viltrum_start_pops.1.desc:0 "Emergency medical reports flood in from every district of Viltrum. A previously unknown pathogen is spreading through our population at an exponential rate. Despite our enhanced immune systems and legendary resilience, Viltrumites are falling ill by the thousands. Our greatest scientists scramble desperately to understand this plague, but early projections are nothing short of catastrophic. The virus appears specifically engineered to target our unique biology. Somehow, it bypasses every defense our bodies have evolved over millennia. We must prepare for losses on a scale our empire has never witnessed."
 viltrum_start_pops.1.a:0 "Sound the alarm! Mobilize every medical facility!"
 viltrum_start_pops.3.name:0 "The Last Survivors"
 viltrum_start_pops.3.desc:0 "Silence. After months of death and devastation, the Scourge Virus has finally burned itself out. The streets of our once-mighty cities lie empty, haunting monuments to our fallen civilization. Medical teams report that only a handful of pure-blooded Viltrumites remain alive across the entire homeworld. Perhaps one hundred. Perhaps fewer.\n\nWe few survivors stand alone in the ruins of our empire. Where billions once thrived in proud dominance, now only the strongest endure. But we are still Viltrumites. Conquest flows through our veins like blood. We will rebuild from these ashes. We will expand across the stars once more. And we will ensure that our species never faces extinction again. The galaxy does not yet know it, but this is not our end. This is our rebirth."
 viltrum_start_pops.3.a:0 "We are the last. We will be the first of a new era."
 viltrum_start_pops.4.name:0 "The Scourge Virus: The First Wave"
 viltrum_start_pops.4.desc:0 "The Scourge Virus spreads like wildfire through our cities. Hospitals overflow with the infected. Medical facilities designed to handle mere hundreds now hold tens of thousands. Our greatest warriors, beings who have lived for centuries and survived countless battles, fall ill within hours of exposure. Grand Regent Thragg has ordered a complete planetary quarantine of the infected zones, but containment may already be impossible. Our medical teams work around the clock to find a cure, any cure, but the virus adapts and mutates faster than we can study it. We are watching our civilization die in real time."
 viltrum_start_pops.4.a:0 "Mobilize every resource we have. Find a cure!"
 viltrum_start_pops.5.name:0 "The Scourge Virus: The Culling"
 viltrum_start_pops.5.desc:0 "Entire districts lie silent now. The great training halls where warriors once sparred in preparation for conquest stand empty and abandoned. Bodies line the streets faster than survivors can remove them. Yet a disturbing pattern has emerged from the chaos. Those with the purest Viltrumite bloodlines seem to resist the virus longer. The weaker bloodlines, those with diluted heritage from lesser species, fall first and fastest. It is as if the virus knows our genetics intimately, targeting those with impure DNA while the strongest pure-bloods fight to survive. Whether by design or terrible coincidence, the Scourge Virus is culling the weak from our species."
 viltrum_start_pops.5.a:0 "The weak were always destined to fall. Only the strong remain."
 viltrum_start_pops.6.name:0 "The Scourge Virus: The Final Days"
 viltrum_start_pops.6.desc:0 "Viltrum's great cities are tombs now. Where millions once lived and trained for galactic conquest, only echoes of the past remain. The Council chambers sit vacant. Most council members have perished. Grand Regent Thragg himself oversees a government of ghosts. A handful of us remain, scattered survivors clinging desperately to life. We can feel the virus weakening now, burning itself out as it runs out of viable hosts. But at what cost? Our mighty empire, which once dominated entire star clusters, has been reduced to a fraction of what we were. Those of us who survive carry the weight of an entire civilization on our shoulders. We are all that remains of Viltrum's glory."
 viltrum_start_pops.6.a:0 "We will endure this darkness. We must."
 
