l_english:
 
 species_name_viltrumite_species:0 "Viltrumite"
 species_plural_viltrumite_species:0 "Viltrumites"
 species_adjective_viltrumite_species:0 "Viltrumite"
 trait_viltrumite_pure:0 "Pure Viltrumite"
 trait_viltrumite_pure_desc:0 "Superhuman warriors of unmatched strength and longevity."
 
 origin_viltrum_survivors:0 "Viltrum Survivors"
 origin_viltrum_survivors_desc:0 "Viltrum was shattered by the Scourge Virus. You are the last pure-blooded survivors, destined to reclaim the galaxy through conquest. Start with 100 or less surviving the Scourge Virus. Dictatorial rule. Authoritarian, Xenophobe, Militarist ethics. +50 Naval Cap, +25% Building Speed, +2 Building Slots, -20% Habitat Districts, +300% Unity from Jobs."
 origin_viltrum_survivors_secondary_desc:0 "Start with 100 or less population surviving the Scourge Virus. Growth is nearly halted by Viltrumite way of life."
 origin_viltrum_survivors_starting_pops:0 "Survivors' Resolve"
 origin_viltrum_survivors_starting_pops_desc:0 "The few remaining Viltrumites struggle to rebuild. Growth is 90% slower than normal."
 
 bombardment_viltrumite_annihilation:0 "Viltrumite Annihilation"
 bombardment_viltrumite_annihilation_desc:0 "Viltrumites descend to shatter worlds from orbit. Armies vaporize, populations perish, planets crack into lifeless tombs."
 viltrumite_cracked_tomb:0 "Viltrumite Cracked Tomb"
 viltrumite_cracked_tomb_desc:0 "Viltrumite Annihilation has shattered the world into a lifeless, cracked husk."
 
 viltrum_annihilation.2.name:0 "Planet Shattered"
 viltrum_annihilation.2.desc:0 "Our relentless bombardment has fractured the planet's core. The world below convulses as massive tectonic rifts tear across its surface. Within moments, the planet explodes into billions of lifeless fragments, scattered across the void. Nothing remains but debris—a monument to Viltrumite power."
 viltrum_annihilation.2.a:0 "Another world broken."

 viltrum_start_pops.1.name:0 "The Scourge Virus"
 viltrum_start_pops.1.desc:0 "Medical reports flood in from across Viltrum. A previously unknown pathogen has begun spreading through our population at an alarming rate. Despite our enhanced immune systems and legendary resilience, Viltrumites are falling ill by the thousands. Our scientists scramble to understand this plague, but early projections are catastrophic. The virus appears to be specifically designed to target our unique biology. We must brace ourselves for unprecedented losses."
 viltrum_start_pops.1.a:0 "Sound the alarm across all territories!"
 viltrum_start_pops.3.name:0 "The Last Survivors"
 viltrum_start_pops.3.desc:0 "Silence. After months of death and devastation, the Scourge Virus has finally burned itself out. The streets of our once-mighty cities lie empty, monuments to our fallen civilization. Medical teams report that only a handful of pure-blooded Viltrumites remain alive across the entire homeworld.\n\nWe few survivors stand in the ruins of our empire. Where billions once thrived, now only the strongest endure. But we are Viltrumites—conquest runs in our blood. We will rebuild. We will expand. And we will ensure that our species never faces extinction again."
 viltrum_start_pops.3.a:0 "We are the last. We will be the first of a new era."
 viltrum_start_pops.4.name:0 "The First Wave"
 viltrum_start_pops.4.desc:0 "The Scourge Virus spreads like wildfire through our cities. Hospitals overflow with the infected. Our greatest warriors, beings who have lived for centuries, fall ill within hours. Grand Regent Thragg has ordered a complete quarantine of the infected zones, but it may already be too late. Our medical teams work desperately to find a cure, but the virus adapts faster than we can study it."
 viltrum_start_pops.4.a:0 "Mobilize every resource we have."
 viltrum_start_pops.5.name:0 "The Culling"
 viltrum_start_pops.5.desc:0 "Entire districts lie silent now. The great training halls where warriors once sparred stand empty. Bodies line the streets faster than we can remove them. Yet a disturbing pattern emerges, those with the purest Viltrumite bloodlines seem to resist longer. The weaker bloodlines fall first. It's as if the virus knows our genetics, targeting those with diluted heritage. Only the strongest pure-bloods remain standing."
 viltrum_start_pops.5.a:0 "The weak were always destined to fall."
 viltrum_start_pops.6.name:0 "The Final Days"
 viltrum_start_pops.6.desc:0 "Viltrum's cities are tombs now. Where millions once lived, only echoes remain. The Council chambers sit vacant—most council members have perished. A handful of us remain, scattered survivors clinging to life. We can feel the virus weakening, burning itself out as it runs out of hosts. But at what cost? Our mighty empire has been reduced to a fraction of what we were. Those of us who survive carry the weight of an entire civilization."
 viltrum_start_pops.6.a:0 "We will endure. We must."
 
