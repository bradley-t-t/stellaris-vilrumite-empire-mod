 origin_thraxxan_swarm:0 "Thraxxan Swarm"
 origin_thraxxan_swarm_desc:0 "The Hive does not negotiate. It does not pause. It hatches, consumes, expands, and hatches again. Every world it touches becomes a nest. Every species it encounters becomes food or fertilizer.\n\n§YOrigin Benefits:§!\n+20% Assembly Speed\n+15% Worker Output\n+30% Army Damage\n-25% Army Upkeep\n+20% Ship Build Speed\n+15% Naval Capacity\n+50% Orbital Bombardment Damage\n-30% War Exhaustion\n-20% Claim Cost\n\n§RPenalties:§!\n-15% Amenities\n-20% Diplomatic Weight\n-50 Trust Cap"
 origin_thraxxan_swarm_secondary_desc:0 "Requires Dictatorial or Imperial authority with Fanatic Militarist ethics."
 
 origin_coalition_unity:0 "Coalition Unity"
 origin_coalition_unity_desc:0 "Alone, each species is vulnerable. Together, they are something no tyrant has ever managed to conquer: a civilization that actually works. The Coalition proves that cooperation isn't weakness - it's the only strategy that scales.\n\n§YOrigin Benefits:§!\n+50% Trust Growth\n+30% Diplomatic Weight\n+50% Improve Relations\n-25% Trade Fee\n+2 Scientist Capacity\n+15% Research Speed\n+25% Unity Production\n+10% Happiness\n+15% Amenities\n\n§RPenalties:§!\n-20% Naval Capacity\n-15% Weapon Damage\n+25% War Exhaustion"
 origin_coalition_unity_secondary_desc:0 "Requires Democratic authority with Xenophile ethics and Pacifist or Egalitarian ethics."
 
 origin_sequid_parasites:0 "Sequid Parasitism"
 origin_sequid_parasites_desc:0 "First contact with the Sequids always ends the same way. The diplomats smile, shake hands, and return home. Weeks later, they stop blinking at the right times. Then the policy changes begin.\n\n§YOrigin Benefits:§!\n+50% Ethics Attraction\n+10 Stability\n-50% Resettlement Cost\n+30% Resettlement Attraction\n+2 Encryption\n+2 Decryption\n+1 Spy Network Level\n+25% Enslaved Pop Output\n+20% Army Damage\n+15% Research Speed\n+25% Biology Research\n\n§RPenalties:§!\n-15% Happiness\n-75 Trust Cap\n-25% Diplomatic Weight\n-10% Amenities"
 origin_sequid_parasites_secondary_desc:0 "Requires Dictatorial authority with Authoritarian and Materialist ethics."
 
 origin_flaxan_dimension:0 "Flaxan Dimension"
 origin_flaxan_dimension_desc:0 "They appear without warning - fleets pouring through rifts in spacetime, already firing. By the time a defense grid spins up, the Flaxans have already won or withdrawn. In their home dimension, years pass for every hour in ours. They plan invasions across lifetimes.\n\n§YOrigin Benefits:§!\n+50% Ship Speed\n+2 Hyperlane Range\n+50% Emergency FTL Chance\n+40% Ship Build Speed\n+30% Building Speed\n+25% Megastructure Speed\n+30% Evasion\n+15% Fire Rate\n+20% Naval Capacity\n+30% Physics Research\n+15% Engineering Research\n\n§RPenalties:§!\n-40% Leader Lifespan\n-20% Leader XP Gain"
 origin_flaxan_dimension_secondary_desc:0 "Requires Dictatorial or Imperial authority with Fanatic Militarist ethics."
 
 origin_martian_rebellion:0 "Martian Rebellion"
 origin_martian_rebellion_desc:0 "Earth called it a colony. Mars called it slavery. The rebellion was short, brutal, and one-sided - in Mars's favor. Now the Red Planet forges its own destiny, its people hardened by thin air, radiation, and the certain knowledge that nobody is coming to save them.\n\n§YOrigin Benefits:§!\n+35% Army Damage\n+25% Army Morale\n-20% Army Upkeep\n+25% Bombardment Damage\n+25% Fire Rate (Home Territory)\n+4 Defense Platforms\n+2 Sensor Range\n+30% Miner Output\n+20% Alloy Production\n+15% Metallurgist Output\n+25% Unity\n+30% Ethics Attraction\n-25% War Exhaustion\n\n§RPenalties:§!\n-30% Diplomatic Weight\n-50 Trust Cap\n-25% Improve Relations"
 origin_martian_rebellion_secondary_desc:0 "Requires Oligarchic or Dictatorial authority with Militarist ethics."
 
