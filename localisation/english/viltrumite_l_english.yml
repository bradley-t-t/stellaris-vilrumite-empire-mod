 bombardment_viltrumite_annihilation:0 "Viltrumite Annihilation"
 bombardment_viltrumite_annihilation_desc:0 "There are no missiles. No warheads. Viltrumite warriors descend through orbital fire like it isn't there, strike the planetary crust at relativistic speed, and keep hitting until the mantle cracks. Fortifications are irrelevant. Armies are obstacles measured in seconds. When a world refuses to submit, they unmake it."
 viltrumite_cracked_tomb:0 "Viltrumite Cracked Tomb"
 viltrumite_cracked_tomb_desc:0 "This world said no. The tectonic scars speak for themselves - continent-wide fractures where Viltrumite fists met bedrock and the bedrock lost. Nothing lives here now. Nothing will again."
 
 viltrum_annihilation.2.name:0 "Planet Shattered"
 viltrum_annihilation.2.desc:0 "The final blow lands. The crust buckles, splits, and comes apart. For a brief moment the planet holds its shape - then the mantle vents through a thousand fractures and the world simply ceases to exist. Debris scatters across the system. A new asteroid field where a civilization used to be."
 viltrum_annihilation.2.a:0 "Another world broken. The galaxy learns fear."

 viltrum_start_pops.1.name:0 "The Scourge Virus: First Contact"
 viltrum_start_pops.1.desc:0 "Medical reports arrive from every district simultaneously. A pathogen - unknown, fast, engineered - is tearing through the population. Viltrumites who have survived centuries of warfare are collapsing within hours of exposure. The virus targets our biology specifically, slipping past immune defenses that have stopped everything else for ten thousand years. Early projections are not catastrophic. They are extinction-level."
 viltrum_start_pops.1.a:0 "Sound the alarm! Mobilize every medical facility!"
 viltrum_start_pops.3.name:0 "The Last Survivors"
 viltrum_start_pops.3.desc:0 "Silence.\n\nThe virus has burned through its hosts and died. The cities stand empty. The training halls echo. Medical scans confirm what we already know: fewer than a hundred Viltrumites draw breath on the entire planet.\n\nBut we are the hundred who survived. The strongest bloodlines. The ones the virus could not kill. Conquest is not something we choose - it is what we are. The galaxy has not yet learned what a hundred Viltrumites can do. It will."
 viltrum_start_pops.3.a:0 "We are the last. We will be the first of a new era."
 viltrum_start_pops.4.name:0 "The Scourge Virus: The First Wave"
 viltrum_start_pops.4.desc:0 "Hospitals have stopped admitting patients - there is no room and no point. Warriors who conquered star systems are dying in hallways. Grand Regent Thragg has ordered quarantine zones, but the virus moves faster than the quarantine. Our scientists cannot keep pace with its mutations. We are not fighting this plague. We are watching it win."
 viltrum_start_pops.4.a:0 "Mobilize every resource we have. Find a cure!"
 viltrum_start_pops.5.name:0 "The Scourge Virus: The Culling"
 viltrum_start_pops.5.desc:0 "A pattern has emerged from the dying. The diluted bloodlines fall first - those with mixed heritage, weaker genetics, impure lineage. The purest Viltrumites resist longer. Not indefinitely, but longer. The virus is performing a selection that even the most ruthless eugenics program never achieved. It is killing everything that is not perfect."
 viltrum_start_pops.5.a:0 "The weak were always destined to fall. Only the strong remain."
 viltrum_start_pops.6.name:0 "The Scourge Virus: The Final Days"
 viltrum_start_pops.6.desc:0 "The Council is dead. The cities are tombs. Grand Regent Thragg governs a civilization that fits in a single room. The virus is weakening - running out of hosts to kill - but the cost is beyond calculation. An empire that spanned star clusters now numbers in the hundreds. Those who remain can feel it: the virus is almost done. Soon there will be nothing left to infect. The question is whether there will be anything left to rebuild."
 viltrum_start_pops.6.a:0 "We will endure this darkness. We must."

 operation_embedded_viltrumite:0 "Embedded Viltrumite Takeover"
 operation_embedded_viltrumite_desc:0 "A single Viltrumite is deployed to a target world under deep cover. Over time, they consolidate power through intimidation, strategic violence, and the quiet elimination of local leadership - until the planet's government answers to us alone. No fleet. No declaration. Just one Viltrumite, and the inevitable result."
 operation_embedded_viltrumite_no_planets:0 "Target must have at least one non-capital planet."

 viltrum_espionage.10.name:0 "Embedded Viltrumite: Infiltration"
 viltrum_espionage.10.desc:0 "Our operative has made planetfall undetected. They walk among the population as one of them - unremarkable, patient, watching. Local security has no idea what is living in their midst. The first phase is complete."
 viltrum_espionage.10.a:0 "They will never see it coming."

 viltrum_espionage.20.name:0 "Embedded Viltrumite: Subversion"
 viltrum_espionage.20.desc:0 "Key officials have been approached. Some were persuaded. Others were shown what a Viltrumite can do to a reinforced bunker door with one hand, and then persuaded. Local military commanders are now reporting to our operative. The civilian government suspects nothing - their own security apparatus now works for us."
 viltrum_espionage.20.a:0 "Tighten the grip."

 viltrum_espionage.30.name:0 "Embedded Viltrumite: Seizure"
 viltrum_espionage.30.desc:0 "The transition was almost silent. Key leaders removed in a single night. Communications seized. Defense grids locked under new authorization codes. By morning, the planet's population woke to a new flag and a new reality. Anyone who resisted learned very quickly why that was a mistake."
 viltrum_espionage.30.a:0 "The world is ours."

 viltrum_espionage.1.name:0 "World Claimed"
 viltrum_espionage.1.desc:0 "Our embedded operative has completed the takeover. The planet now flies the Viltrumite banner. Its population, infrastructure, and resources are ours. No fleet was dispatched. No war was declared. One Viltrumite was enough."
 viltrum_espionage.1.a:0 "As it should be."

 viltrum_espionage.2.name:0 "Planet Seized by Unknown Force"
 viltrum_espionage.2.desc:0 "Contact with one of our colonies has gone dark. When communications resumed, the planet was no longer ours. Local leadership has been replaced. Defense systems have been locked out. All evidence points to a single operative - impossibly strong, impossibly fast - who dismantled our entire planetary government overnight."
 viltrum_espionage.2.a:0 "How is this possible?"

 viltrumite_espionage_exposed:0 "Viltrumite Agent Exposed"
 viltrumite_espionage_exposed_desc:0 "A failed infiltration attempt has compromised our intelligence networks. Enemy counterintelligence is on high alert."

