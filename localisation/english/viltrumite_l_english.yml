 trait_viltrumite_pure:0 "Pure Viltrumite"
 trait_viltrumite_pure_desc:0 "Millennia of selective breeding have produced a species of unrivaled physical perfection. A single Viltrumite can tear through armored battalions, survive in the vacuum of space, and live long enough to watch civilizations rise and fall. Their biology is not evolved - it is perfected.\n\n§YRacial Traits:§!\nLeaders live 5,000 years\nArmies deal 1,000% more damage\nArmies have 1,000% more health\nArmy morale increased by 500%\nLeaders gain 100% more experience\nPerfect habitability on all worlds\nResearch speed increased by 30%\nEdict fund increased by 25%\n\n§RBiological Limitation:§!\nPopulation growth reduced by 50%"
 
 trait_gda_human:0 "GDA Training"
 trait_gda_human_desc:0 "Outgunned, outnumbered, outmatched - and still standing. GDA operatives compensate for biological inferiority with superior engineering, hardened infrastructure, and the stubborn refusal to die quietly.\n\n§YRacial Traits:§!\n+10% Engineering research\n+10% Ship hull points\n+10% Hull regeneration\n+2 Defense platform capacity\n+5% Happiness\n+10% Unity production"
 
 trait_thraxxan_swarm:0 "Swarm Biology"
 trait_thraxxan_swarm_desc:0 "No individual Thraxxan matters. The hive breeds, builds, and dies in relentless cycles - each generation hatching with the instincts of the last. What they lack in strength, they replace with sheer, suffocating numbers.\n\n§YRacial Traits:§!\n+25% Pop assembly speed\n+15% Mineral production\n+10% Worker output\n-15% Building costs\n+1,000% Leader experience gain\nNo crime\n\n§RWeaknesses:§!\n-70 Years leader lifespan\n-25% Army damage"
 
 trait_coalition_unity:0 "Coalition Diplomacy"
 trait_coalition_unity_desc:0 "Strength through diversity. Coalition species have internalized the rhythms of compromise and mutual reliance - a cultural instinct that makes them formidable at the negotiating table and unremarkable on the battlefield.\n\n§YRacial Traits:§!\n+25% Trust growth\n+15% Diplomatic weight\n+15% Amenities\n+15% Ethics attraction\n\n§RWeaknesses:§!\n-15% Army damage"
 
 trait_sequid_parasites:0 "Parasitic Control"
 trait_sequid_parasites_desc:0 "A Sequid alone is nothing - a soft, pulsing thing that dies in open air. Attached to a host's nervous system, it becomes something far worse: a puppeteer with perfect access to its victim's knowledge, skills, and body.\n\n§YRacial Traits:§!\n+2 Encryption\n+2 Decryption\n+15% Physics research\n+25% Slave political power\n+10% Specialist output\n\n§RWeaknesses:§!\n-30% Army damage\n-20% Army health"
 
 trait_flaxan_temporal:0 "Temporal Acceleration"
 trait_flaxan_temporal_desc:0 "Time moves differently for the Flaxan. They think faster, fight faster, age faster. A Flaxan general might plan and execute an entire campaign in the time it takes an enemy to mobilize - then die of old age before the victory parade.\n\n§YRacial Traits:§!\n+20% Pop assembly speed\n+25% Army damage\n+25% Ship speed\n+15% Ship evasion\n+10% Weapon damage\n\n§RWeaknesses:§!\n-25 Years leader lifespan\n-5% Happiness"
 
 trait_martian_colonist:0 "Martian Warrior"
 trait_martian_colonist_desc:0 "Born on a world that tried to kill them every day, Martians are hard people with short tempers and long memories. They built their civilization in dust storms and radiation, and they'll burn it all down before they kneel again.\n\n§YRacial Traits:§!\n+10% Habitability\n-10% Structure costs\n+25% Army damage\n+15% Army morale\n+10% Ship hull points\n\n§RWeaknesses:§!\n-10% Ethics attraction\n+5 Crime"
 
 origin_viltrum_survivors:0 "Viltrum Survivors"
 origin_viltrum_survivors_desc:0 "The Scourge Virus killed billions. The weak. The diluted. The unworthy. What remains is a hundred pure-blooded Viltrumites - each one capable of leveling cities, surviving in vacuum, and outliving entire civilizations. They do not mourn what was lost. They consider it pruning.\n\nViltrumite scientists are few, but they think in millennia - solving problems that would take lesser species generations. And when conquest brings new worlds under the banner, their researchers are not killed. They are put to work. Willingly or otherwise. Every subjugated civilization adds its knowledge to the Empire's archives and its brightest minds to its laboratories.\n\nThe galaxy will kneel, or it will shatter."
 origin_viltrum_survivors_secondary_desc:0 "Requires Dictatorial authority with Authoritarian, Xenophobe, and Militarist ethics. Your homeworld begins with approximately 100 Viltrumites who survived the plague."
 origin_viltrum_survivors_starting_pops:0 "Survivors' Resolve"
 origin_viltrum_survivors_starting_pops_desc:0 "The Scourge Virus culled the weak. Only the purest bloodlines survived. Growth is slow - there are so few left - but each survivor carries the strength of a thousand lesser beings."
 
 origin_gda_earth_defense:0 "GDA: Earth Defense"
 origin_gda_earth_defense_desc:0 "Cecil Stedman doesn't sleep. He reads threat assessments. The GDA exists because humanity is fragile, the galaxy is hostile, and no one else is going to do what needs doing. Every alien signal is a potential extinction event. Every handshake hides a knife.\n\nPreparation. Paranoia. Whatever it takes."
 origin_gda_earth_defense_secondary_desc:0 "Requires Oligarchic authority with Xenophobe ethics and Militarist or Materialist ethics. Enhanced espionage and defensive capabilities, reduced offensive power."
 
