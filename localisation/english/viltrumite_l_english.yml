 species_adjective_viltrumite_species:0 "Viltrumite"
 trait_viltrumite_pure:0 "Pure Viltrumite"
 trait_viltrumite_pure_desc:0 "Born of the warrior race that dominated galaxies for millennia. Viltrumites possess strength that can crack planets, reflexes that dodge starfire, and lifespans measured in thousands of years. Their very biology is engineered for conquest.\n\n§YRacial Traits:§!\nLeaders live 5000 years\nArmies deal 500% more damage\nArmies have 500% more health\nLeaders gain 50% more experience\nPerfect habitability on all worlds\nResearch speed increased by 30%\nEdict fund increased by 25%\n\n§RBiological Limitation:§!\nPopulation growth reduced by 50%"
 
 trait_gda_human:0 "GDA Training"
 trait_gda_human_desc:0 "Humanity has learned to survive against overwhelming alien threats through adaptability, ingenuity, and determination. GDA training emphasizes defensive strategies, technological innovation, and unwavering resolve.\n\n§YRacial Traits:§!\n+10% Engineering research\n+10% Ship hull points\n+10% Hull regeneration\n+2 Defense platform capacity\n+5% Happiness\n+10% Unity production"
 
 trait_thraxxan_swarm:0 "Swarm Biology"
 trait_thraxxan_swarm_desc:0 "The Thraxxan hive operates as a unified organism, breeding rapidly and working with industrial efficiency. Individual weakness is offset by overwhelming numbers and collective strength. Their extremely short lifespans are compensated by rapid generational learning.\n\n§YRacial Traits:§!\n+25% Pop assembly speed\n+15% Mineral production\n+10% Worker output\n-15% Building costs\n+1000% Leader experience gain\nNo crime\n\n§RWeaknesses:§!\n-70 Years leader lifespan\n-25% Army damage"
 
 trait_coalition_unity:0 "Coalition Diplomacy"
 trait_coalition_unity_desc:0 "Multiple species working together in harmony have learned the value of cooperation, compromise, and mutual respect. The Coalition's strength lies in its diversity and diplomatic prowess.\n\n§YRacial Traits:§!\n+25% Trust growth\n+15% Diplomatic weight\n+10% Administrative capacity\n+15% Amenities\n+15% Ethics attraction\n\n§RWeaknesses:§!\n-15% Army damage"
 
 trait_sequid_parasites:0 "Parasitic Control"
 trait_sequid_parasites_desc:0 "Sequids infiltrate and dominate other species through mental parasitism. Their bodies are weak, but their minds are powerful tools of subversion and control.\n\n§YRacial Traits:§!\n+2 Encryption\n+2 Decryption\n+15% Physics research\n+25% Slave political power\n+10% Specialist output\n\n§RWeaknesses:§!\n-30% Army damage\n-20% Army health"
 
 trait_flaxan_temporal:0 "Temporal Acceleration"
 trait_flaxan_temporal_desc:0 "Flaxans experience time at an accelerated rate, aging rapidly but moving with incredible speed. What takes others years, they accomplish in days.\n\n§YRacial Traits:§!\n+20% Pop assembly speed\n+25% Army damage\n+25% Ship speed\n+15% Ship evasion\n+10% Weapon damage\n\n§RWeaknesses:§!\n-25 Years leader lifespan\n-5% Happiness"
 
 trait_martian_colonist:0 "Martian Warrior"
 trait_martian_colonist_desc:0 "Hardened by Mars' brutal environment and forged in rebellion, Martians are resilient fighters who excel in combat but retain their rebellious nature.\n\n§YRacial Traits:§!\n+10% Habitability\n-10% Structure costs\n+25% Army damage\n+15% Army morale\n+10% Ship hull points\n\n§RWeaknesses:§!\n-10% Ethics attraction\n+5 Crime"
 
 origin_viltrum_survivors:0 "Viltrum Survivors"
 origin_viltrum_survivors_desc:0 "The Scourge Virus has devastated Viltrum. What was once a thriving empire of billions is now reduced to barely a hundred pure-blooded survivors. But these survivors are not broken. They are the strongest, the most ruthless, the most skilled warriors the Viltrumite Empire has ever produced. Living for thousands of years, nearly impossible to kill, and capable of shattering worlds with their bare hands, they will reclaim what was lost. The galaxy will bow, or it will burn."
 origin_viltrum_survivors_secondary_desc:0 "Requires Dictatorial authority with Authoritarian, Xenophobe, and Militarist ethics. Your homeworld begins with approximately 100 Viltrumites who survived the plague."
 origin_viltrum_survivors_starting_pops:0 "Survivors' Resolve"
 origin_viltrum_survivors_starting_pops_desc:0 "The devastating Scourge Virus has culled the weak. Only the strongest pure-blooded Viltrumites remain. Population growth is severely reduced as the survivors focus on conquest rather than reproduction."
 
 origin_gda_earth_defense:0 "GDA: Earth Defense"
 origin_gda_earth_defense_desc:0 "The Global Defense Agency protects humanity from extraterrestrial threats through intelligence, espionage, and strategic defense. Operating under Director Cecil Stedman's pragmatic leadership, the GDA compensates for humanity's physical inferiority with superior technology, intelligence networks, and ruthless efficiency. Every alien contact is a potential threat. Every advantage must be exploited. Earth's survival depends on preparation, paranoia, and the willingness to do whatever is necessary."
 origin_gda_earth_defense_secondary_desc:0 "Requires Oligarchic authority with Xenophobe ethics and Militarist or Materialist ethics. Enhanced espionage and defensive capabilities, reduced offensive power."
 
