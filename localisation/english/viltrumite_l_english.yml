 origin_thraxxan_swarm:0 "Thraxxan Swarm"
 origin_thraxxan_swarm_desc:0 "The Thraxxan Hive is a hyper-aggressive insectoid swarm empire that breeds rapidly and conquers through overwhelming numbers. Their hive mentality drives endless expansion and brutal warfare against all who resist.\n\n§YOrigin Benefits:§!\n+20% Assembly Speed\n+15% Worker Output\n+30% Army Damage\n-25% Army Upkeep\n+20% Ship Build Speed\n+15% Naval Capacity\n+50% Orbital Bombardment Damage\n-30% War Exhaustion\n-20% Claim Cost\n\n§RPenalties:§!\n-15% Amenities\n-20% Diplomatic Weight\n-50 Trust Cap"
 origin_thraxxan_swarm_secondary_desc:0 "Requires Dictatorial or Imperial authority with Fanatic Militarist ethics."
 
 origin_coalition_unity:0 "Coalition Unity"
 origin_coalition_unity_desc:0 "The Coalition of Planets is a democratic federation of diverse species united for mutual prosperity and peace. Through diplomacy, cooperation, and trade, they achieve together what no single species could accomplish alone.\n\n§YOrigin Benefits:§!\n+50% Trust Growth\n+30% Diplomatic Weight\n+50% Improve Relations\n-25% Trade Fee\n+20% Admin Capacity\n+15% Research Speed\n+25% Unity Production\n+10% Happiness\n+15% Amenities\n\n§RPenalties:§!\n-20% Naval Capacity\n-15% Weapon Damage\n+25% War Exhaustion"
 origin_coalition_unity_secondary_desc:0 "Requires Democratic authority with Xenophile ethics and Pacifist or Egalitarian ethics."
 
 origin_sequid_parasites:0 "Sequid Parasitism"
 origin_sequid_parasites_desc:0 "The Sequid Consciousness is a parasitic species that takes over host bodies, forming a disturbing collective consciousness. Through neural manipulation and body control, they infiltrate and assimilate other species.\n\n§YOrigin Benefits:§!\n+50% Ethics Attraction\n+10 Stability\n-50% Resettlement Cost\n+2 Encryption\n+2 Decryption\n+1 Spy Network Level\n+25% Enslaved Pop Output\n+20% Army Damage\n+15% Research Speed\n+25% Biology Research\n\n§RPenalties:§!\n-15% Happiness\n-75 Trust Cap\n-25% Diplomatic Weight\n-10% Amenities"
 origin_sequid_parasites_secondary_desc:0 "Requires Dictatorial authority with Authoritarian and Materialist ethics."
 
 origin_flaxan_dimension:0 "Flaxan Dimension"
 origin_flaxan_dimension_desc:0 "The Flaxans are interdimensional invaders who experience time differently. Using portal technology and dimensional manipulation, they strike rapidly from their home dimension before retreating.\n\n§YOrigin Benefits:§!\n+50% Ship Speed\n+2 Hyperlane Range\n+50% Emergency FTL Chance\n+40% Ship Build Speed\n+30% Building Speed\n+30% Evasion\n+15% Fire Rate\n+20% Naval Capacity\n+30% Physics Research\n+15% Engineering Research\n\n§RPenalties:§!\n-40% Leader Lifespan\n-20% Leader XP Gain"
 origin_flaxan_dimension_secondary_desc:0 "Requires Dictatorial or Imperial authority with Fanatic Militarist ethics."
 
 origin_martian_rebellion:0 "Martian Rebellion"
 origin_martian_rebellion_desc:0 "The Martian Empire is a Mars colony that rebelled against Earth rule. Hardened by Mars's harsh environment and forged in rebellion, they are fiercely independent militarists proud of their Red Planet heritage.\n\n§YOrigin Benefits:§!\n+35% Army Damage\n+25% Army Morale\n-20% Army Upkeep\n+25% Bombardment Damage\n+25% Fire Rate (Home Territory)\n+4 Defense Platforms\n+2 Sensor Range\n+30% Miner Output\n+20% Alloy Production\n+15% Metallurgist Output\n+25% Unity\n+30% Ethics Attraction\n-25% War Exhaustion\n\n§RPenalties:§!\n-30% Diplomatic Weight\n-50 Trust Cap\n-25% Improve Relations"
 origin_martian_rebellion_secondary_desc:0 "Requires Oligarchic or Dictatorial authority with Militarist ethics."
 
